name: Run Unit Tests

on: [push]

jobs:
  run-unit-tests:
    name: Run Unit Tests
    runs-on: unbuntu-latest

    services:
      postgres:
        image: bitnami/postgresql
        ports:
          - 5432:5432
      environment:
        - POSTGRESQL_USERNAME=docker

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - run: npm run test:e2e
        env:
          JWT_SECRET: testing
          DATABASE_URL:
